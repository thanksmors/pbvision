<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>pbvision — pickleball analysis</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    button { padding: .4rem .8rem; border-radius: 6px; border: 1px solid #bbb; background: #f6f6f6; cursor: pointer; }
    button.primary { background: #2b6; color: #fff; border-color: #2b6; }
    progress { width: 100%; height: 1rem; }
    .stage-wrap { position: relative; line-height: 0; }
    #overlay { position: absolute; left: 0; top: 0; pointer-events: none; }
    video { width: 100%; border-radius: 6px; background: #000; }
    .point { display: flex; justify-content: space-between; padding: .45rem .6rem; border-bottom: 1px solid #eee; cursor: pointer; }
    .point:hover { background: #f4f8ff; }
    .point.active { background: #eef6ff; }
    .badge { font-size: .75rem; padding: .1rem .5rem; border-radius: 999px; background: #eef; }
    .review { background: #fee; }
    .win { font-weight: 600; }
    .muted { color: #888; font-size: .85rem; }
    .status { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .8rem; }
    .stage { font-size: .8rem; padding: .25rem .6rem; border-radius: 6px; border: 1px solid #ddd; }
    .stage.ok { background: #eafaef; border-color: #9d9; }
    .stage.skip { background: #fde7e7; border-color: #e99; }
    .stage b { font-weight: 600; }
  </style>
</head>
<body>
  <h1>🏓 pbvision</h1>
  <p class="muted">Upload a pickleball match — get points, serves, the ball trajectory and the winner of each rally. No video handy? Run the synthetic demo.</p>

  <div class="card">
    <input type="file" id="file" accept="video/*" />
    <button id="upload" class="primary">Analyze</button>
    <button id="demo">Run demo</button>
    <div id="progress" style="display:none; margin-top:1rem;">
      <progress id="bar" max="1" value="0"></progress>
      <div id="stage" class="muted"></div>
    </div>
  </div>

  <div id="results" class="card" style="display:none;">
    <div id="status" class="status"></div>
    <button id="calibrate">📐 Calibrate court</button>

    <div id="calibration" style="display:none; margin-top:1rem;">
      <div id="calMsg" class="muted"></div>
      <div style="display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-start;">
        <div style="flex:none;">
          <div class="muted" style="margin-bottom:.2rem;">1. pick a point</div>
          <canvas id="calDiagram" width="190" height="340" style="border:1px solid #ccc; cursor:pointer;"></canvas>
        </div>
        <div style="flex:1; min-width:280px;">
          <div class="muted" style="margin-bottom:.2rem;">2. click it on your video</div>
          <canvas id="calCanvas" style="max-width:100%; border:1px solid #ccc; cursor:crosshair;"></canvas>
        </div>
      </div>
      <div style="margin-top:.5rem;">
        <button id="calUndo">Undo last</button>
        <button id="calReset">Reset</button>
        <button id="calSave" class="primary" disabled>Save &amp; re-analyze</button>
        <button id="calDownload" disabled title="Save the clicked corners as corners.json for scripts/debug_3d.py">⬇ corners.json</button>
        <button id="calCancel">Cancel</button>
      </div>
    </div>

    <div class="stage-wrap">
      <video id="video" controls playsinline></video>
      <canvas id="overlay"></canvas>
    </div>
    <h2 style="font-size:1.05rem; margin-bottom:.2rem;">Points</h2>
    <div class="muted" id="hint">Click a point to jump to it and draw its ball trajectory.</div>
    <div id="points"></div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
let MATCH = null, ACTIVE = -1;

$("upload").onclick = async () => {
  const f = $("file").files[0];
  if (!f) return alert("Pick a video first, or use Run demo.");
  const fd = new FormData();
  fd.append("file", f);
  const r = await fetch("/api/matches", { method: "POST", body: fd });
  startPolling((await r.json()).job_id);
};

$("demo").onclick = async () => {
  const r = await fetch("/api/demo", { method: "POST" });
  startPolling((await r.json()).job_id);
};

function startPolling(jobId) {
  $("progress").style.display = "block";
  $("results").style.display = "none";
  poll(jobId);
}

async function poll(jobId) {
  const s = await (await fetch(`/api/jobs/${jobId}`)).json();
  $("bar").value = s.progress || 0;
  $("stage").textContent = `${s.state} — ${s.stage || ""} ${Math.round((s.progress || 0) * 100)}%`;
  if (s.state === "done") return showResult(jobId);
  if (s.state === "error") { $("stage").textContent = "error: " + s.message; return; }
  setTimeout(() => poll(jobId), 800);
}

async function showResult(jobId) {
  JOB = jobId;
  MATCH = await (await fetch(`/api/matches/${jobId}`)).json();
  $("results").style.display = "block";
  renderStatus();
  const v = $("video");
  v.src = `/api/matches/${jobId}/video`;
  // Keep the overlay drawn whether the video is playing, paused, or seeked.
  v.onloadedmetadata = () => { sizeOverlay(); drawPoint(ACTIVE); };
  v.ontimeupdate = v.onseeked = v.onplay = () => drawPoint(ACTIVE);
  renderPoints();
}

// 3D ball stats from a point's trajectory (filled when camera recovery succeeded). Returns
// null when the point has no reconstructed samples, so callers can hide the 3D UI cleanly.
function point3d(p) {
  let topSpeed = 0, peakHeight = 0, has = false;
  for (const s of (p.ball_trajectory || [])) {
    if (s.world_ft) { peakHeight = Math.max(peakHeight, s.world_ft[2]); has = true; }
    if (s.speed_mph != null) { topSpeed = Math.max(topSpeed, s.speed_mph); }
  }
  return has ? { topSpeed, peakHeight } : null;
}

function match3d() {
  let topSpeed = 0, peakHeight = 0, has = false;
  for (const p of (MATCH.points || [])) {
    const st = point3d(p);
    if (st) { topSpeed = Math.max(topSpeed, st.topSpeed); peakHeight = Math.max(peakHeight, st.peakHeight); has = true; }
  }
  return has ? { topSpeed, peakHeight } : null;
}

// Per-stage status so it's obvious what ran vs. was skipped (and why).
function renderStatus() {
  const warnOf = (stage) =>
    (MATCH.warnings || []).find((w) => w.startsWith(stage + ":"));
  const corners = MATCH.court ? (MATCH.court.keypoints_px || []).length : 0;
  const m3d = match3d();
  const stages = [
    { name: "Players", ok: (MATCH.players || []).length > 0,
      okText: `${(MATCH.players || []).length} tracked`, warn: warnOf("players") },
    { name: "Court", ok: !!MATCH.court,
      okText: `${corners} corners → homography`, warn: warnOf("court") },
    { name: "Ball / points", ok: (MATCH.points || []).length > 0,
      okText: `${(MATCH.points || []).length} points`, warn: warnOf("ball") },
    { name: "3D ball", ok: !!m3d,
      okText: m3d ? `top ${Math.round(m3d.topSpeed)} mph · peak ${m3d.peakHeight.toFixed(1)} ft` : "",
      warn: warnOf("camera_3d") },
  ];
  $("status").innerHTML = stages.map((s) => {
    const cls = s.ok ? "ok" : "skip";
    const detail = s.ok ? s.okText : (s.warn ? s.warn.split(":").slice(1).join(":").trim() : "not detected");
    return `<span class="stage ${cls}"><b>${s.name}:</b> ${s.ok ? "✓ " : "✗ "}${detail}</span>`;
  }).join("");
}

function sizeOverlay() {
  const v = $("video"), c = $("overlay");
  c.width = v.clientWidth;
  c.height = v.clientHeight;
  drawPoint(ACTIVE);   // draw court + players even with no point selected / video paused
}
window.addEventListener("resize", sizeOverlay);

function renderPoints() {
  const box = $("points");
  box.innerHTML = "";
  if (!MATCH.points.length) {
    const nPlayers = (MATCH.players || []).length;
    if (nPlayers) {
      box.innerHTML = `<p class="muted">Tracking ${nPlayers} players (green boxes on the video).
        Points / serves / winners need the <b>ball</b> model, which isn't wired yet — that's the next stage.</p>`;
    } else {
      box.innerHTML = '<p class="muted">No detections. Is the <code>ml</code> extra installed? See the skipped-stages note above.</p>';
    }
    return;
  }
  MATCH.points.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "point" + (i === ACTIVE ? " active" : "");
    const winner = p.winner_team ? `Team ${p.winner_team}` : "—";
    const review = p.needs_review ? '<span class="badge review">review</span>' : "";
    const st = point3d(p);
    const d3 = st ? `<span class="muted">· ⚡${Math.round(st.topSpeed)} mph · ↑${st.peakHeight.toFixed(1)} ft</span>` : "";
    div.innerHTML = `
      <span>#${p.point_index + 1} · frames ${p.start_frame}–${p.end_frame}
        <span class="muted">· serve ${p.serve ? p.serve.server_team + "/" + p.serve.server_side : "—"}</span> ${d3}</span>
      <span><span class="win">${winner}</span> <span class="muted">(${p.win_reason})</span>
        <span class="badge">${Math.round(p.confidence * 100)}%</span> ${review}</span>`;
    div.onclick = () => selectPoint(i);
    box.appendChild(div);
  });
}

// ---- Manual court calibration: click any 4+ visible court landmarks ----
let JOB = null, calImg = null, calScale = 1;
let LANDMARKS = null;                 // name -> [nx, ny] normalized court coords
let armed = null;                     // landmark currently selected in the diagram
let placed = {}, placedOrder = [];    // name -> [src_x, src_y] clicked on the frame
const DGM_M = 18;                     // diagram margin (px)

const LABELS = {
  corner_a_left: "Far baseline · left corner", corner_a_right: "Far baseline · right corner",
  corner_b_left: "Near baseline · left corner", corner_b_right: "Near baseline · right corner",
  kitchen_a_left: "Far kitchen · left", kitchen_a_right: "Far kitchen · right",
  kitchen_b_left: "Near kitchen · left", kitchen_b_right: "Near kitchen · right",
  baseline_a_center: "Far baseline · center", baseline_b_center: "Near baseline · center",
  kitchen_a_center: "Far kitchen · center", kitchen_b_center: "Near kitchen · center",
  net_left: "Net · left sideline", net_right: "Net · right sideline",
};

$("calibrate").onclick = async () => {
  if (!LANDMARKS) LANDMARKS = await (await fetch("/api/court-landmarks")).json();
  $("calibration").style.display = "block";
  placed = {}; placedOrder = []; armed = null;
  $("calSave").disabled = true;
  $("calDownload").disabled = true;
  calImg = new Image();
  calImg.onload = () => {
    const c = $("calCanvas");
    const maxW = Math.min(640, c.parentElement.clientWidth);
    calScale = maxW / calImg.naturalWidth;
    c.width = maxW;
    c.height = Math.round(calImg.naturalHeight * calScale);
    drawDiagram(); drawCal();
  };
  calImg.src = `/api/matches/${JOB}/frame?t=` + Date.now();
};

function dgm(nx, ny) {
  const c = $("calDiagram");
  return [DGM_M + nx * (c.width - 2 * DGM_M), DGM_M + ny * (c.height - 2 * DGM_M)];
}

function drawDiagram() {
  const c = $("calDiagram"), ctx = c.getContext("2d");
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = "#eef6ee"; ctx.fillRect(0, 0, c.width, c.height);
  const L = LANDMARKS;
  const line = (a, b, color = "#888", wdt = 1.5) => {
    ctx.strokeStyle = color; ctx.lineWidth = wdt; ctx.beginPath();
    ctx.moveTo(...dgm(...L[a])); ctx.lineTo(...dgm(...L[b])); ctx.stroke();
  };
  // Court lines.
  line("corner_a_left", "corner_a_right"); line("corner_b_left", "corner_b_right");
  line("corner_a_left", "corner_b_left"); line("corner_a_right", "corner_b_right");
  line("net_left", "net_right", "#39c", 2);
  line("kitchen_a_left", "kitchen_a_right"); line("kitchen_b_left", "kitchen_b_right");
  line("baseline_a_center", "kitchen_a_center"); line("baseline_b_center", "kitchen_b_center");
  // Landmark dots: gray=available, blue=armed, green=placed.
  for (const name in L) {
    const [x, y] = dgm(...L[name]);
    ctx.beginPath(); ctx.arc(x, y, 6, 0, 2 * Math.PI);
    ctx.fillStyle = placed[name] ? "#2b7" : (name === armed ? "#39f" : "#bbb");
    ctx.fill();
    if (name === armed) { ctx.strokeStyle = "#06c"; ctx.lineWidth = 2; ctx.stroke(); }
  }
}

$("calDiagram").onclick = (e) => {
  const r = $("calDiagram").getBoundingClientRect();
  const cx = e.clientX - r.left, cy = e.clientY - r.top;
  let best = null, bestD = 1e9;
  for (const name in LANDMARKS) {
    const [x, y] = dgm(...LANDMARKS[name]);
    const d = Math.hypot(x - cx, y - cy);
    if (d < bestD) { bestD = d; best = name; }
  }
  if (bestD <= 16) { armed = best; drawDiagram(); updateMsg(); }
};

$("calCanvas").onclick = (e) => {
  if (!armed) { updateMsg("Pick a point on the court diagram first."); return; }
  const r = $("calCanvas").getBoundingClientRect();
  const x = (e.clientX - r.left) / calScale, y = (e.clientY - r.top) / calScale;
  if (!placed[armed]) placedOrder.push(armed);
  placed[armed] = [x, y];
  armed = null;
  const enough = Object.keys(placed).length >= 4;
  $("calSave").disabled = !enough;
  $("calDownload").disabled = !enough;
  drawDiagram(); drawCal(); updateMsg();
};

// Export the clicked corners as corners.json (same format as the engine / debug_3d.py),
// generated entirely client-side so it works even before "Save & re-analyze".
$("calDownload").onclick = () => {
  const clean = {};
  for (const name in placed) clean[name] = [placed[name][0], placed[name][1]];
  const blob = new Blob([JSON.stringify(clean, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "corners.json";
  a.click();
  URL.revokeObjectURL(a.href);
};

$("calUndo").onclick = () => {
  const last = placedOrder.pop();
  if (last) delete placed[last];
  $("calSave").disabled = Object.keys(placed).length < 4;
  drawDiagram(); drawCal(); updateMsg();
};
$("calReset").onclick = () => {
  placed = {}; placedOrder = []; armed = null;
  $("calSave").disabled = true;
  $("calDownload").disabled = true; drawDiagram(); drawCal(); updateMsg();
};
$("calCancel").onclick = () => { $("calibration").style.display = "none"; };

$("calSave").onclick = async () => {
  $("calMsg").textContent = "Saving calibration and re-analyzing…";
  const res = await fetch(`/api/matches/${JOB}/court`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(placed),
  });
  if (!res.ok) { updateMsg("Error: " + (await res.json()).detail); return; }
  $("calibration").style.display = "none";
  startPolling(JOB);
};

function updateMsg(override) {
  const n = Object.keys(placed).length;
  $("calMsg").textContent = override || (
    armed ? `Now click "${LABELS[armed]}" on your video.` :
    `${n} point${n === 1 ? "" : "s"} placed (need ≥4, spread out). Pick a point on the diagram, then click it on the video.`
  );
}

function drawCal() {
  const c = $("calCanvas"), ctx = c.getContext("2d");
  ctx.drawImage(calImg, 0, 0, c.width, c.height);
  ctx.fillStyle = "rgba(255,40,200,.95)";
  ctx.font = "12px system-ui";
  for (const name in placed) {
    const x = placed[name][0] * calScale, y = placed[name][1] * calScale;
    ctx.beginPath(); ctx.arc(x, y, 5, 0, 2 * Math.PI); ctx.fill();
    ctx.fillText(LABELS[name].split("·")[1].trim(), x + 7, y - 5);
  }
}

function selectPoint(i) {
  ACTIVE = i;
  renderPoints();
  const fps = MATCH.video.fps || 30;
  $("video").currentTime = MATCH.points[i].start_frame / fps;
  drawPoint(i);
}

// Map a source-pixel coord onto the displayed (scaled) canvas.
function toCanvas(px, c) {
  return [px[0] / MATCH.video.width * c.width, px[1] / MATCH.video.height * c.height];
}

// Nearest player box per track to a given frame (players may be sampled with a stride).
function drawPlayers(ctx, c, frame) {
  if (!MATCH.players) return;
  ctx.lineWidth = 2;
  ctx.font = "12px system-ui";
  for (const pl of MATCH.players) {
    let best = null, bestD = Infinity;
    for (const pos of pl.positions) {
      if (!pos.bbox_px) continue;
      const d = Math.abs(pos.frame - frame);
      if (d < bestD) { bestD = d; best = pos; }
    }
    if (!best || bestD > 15) continue; // don't draw a stale box far from the current frame
    const [x1, y1] = toCanvas([best.bbox_px[0], best.bbox_px[1]], c);
    const [x2, y2] = toCanvas([best.bbox_px[2], best.bbox_px[3]], c);
    ctx.strokeStyle = "rgba(80,220,120,.95)";
    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
    ctx.fillStyle = "rgba(80,220,120,.95)";
    const label = `#${pl.track_id}` + (pl.team ? ` (${pl.team})` : "");
    ctx.fillText(label, x1 + 2, Math.max(12, y1 - 3));
  }
}

function drawPoint(i) {
  const c = $("overlay"), ctx = c.getContext("2d");
  ctx.clearRect(0, 0, c.width, c.height);

  const fps = MATCH.video.fps || 30;
  drawPlayers(ctx, c, $("video").currentTime * fps);

  // Full court outline, projected through the homography (court_quad_px already in draw order:
  // a_left, a_right, b_right, b_left) — shows the whole court even where a corner is off-frame.
  const quad = MATCH.court && MATCH.court.court_quad_px;
  if (quad && quad.length === 4) {
    ctx.strokeStyle = "rgba(255,40,200,.95)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    quad.forEach((p, j) => {
      const [x, y] = toCanvas(p, c);
      j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = "rgba(255,40,200,.95)";
    for (const p of quad) {
      const [x, y] = toCanvas(p, c);
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, 2 * Math.PI);
      ctx.fill();
    }
  }

  if (i < 0 || !MATCH.points[i]) return; // players-only run: nothing more to draw

  // Ball trajectory for the active point.
  const traj = MATCH.points[i].ball_trajectory;
  if (traj && traj.length) {
    ctx.strokeStyle = "rgba(0,200,255,.9)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    traj.forEach((s, j) => {
      const [x, y] = toCanvas(s.px, c);
      j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  // Bounce markers.
  ctx.fillStyle = "rgba(255,80,80,.95)";
  (MATCH.points[i].bounces || []).forEach((b) => {
    const sample = traj.find((s) => s.frame === b.frame) || traj[0];
    const [x, y] = toCanvas(sample.px, c);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, 2 * Math.PI);
    ctx.fill();
  });

  // Live 3D readout: ball marker + height/speed HUD at the current frame.
  if (traj && traj.length) {
    const frame = $("video").currentTime * fps;
    let cur = null, bestD = Infinity;
    for (const s of traj) {
      const d = Math.abs(s.frame - frame);
      if (d < bestD) { bestD = d; cur = s; }
    }
    if (cur && bestD <= 3) {
      const [x, y] = toCanvas(cur.px, c);
      ctx.fillStyle = "rgba(255,235,0,.95)";
      ctx.beginPath();
      ctx.arc(x, y, 6, 0, 2 * Math.PI);
      ctx.fill();
      if (cur.world_ft) {
        const txt = `↑ ${cur.world_ft[2].toFixed(1)} ft` +
          (cur.speed_mph != null ? `   ⚡ ${Math.round(cur.speed_mph)} mph` : "");
        ctx.font = "bold 15px system-ui";
        const w = ctx.measureText(txt).width + 14;
        ctx.fillStyle = "rgba(0,0,0,.6)";
        ctx.fillRect(8, 8, w, 26);
        ctx.fillStyle = "rgba(255,235,0,.98)";
        ctx.fillText(txt, 15, 26);
      }
    }
  }
}
</script>
</body>
</html>
